<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      font-family: Arial, sans-serif;
      padding: 16px;
      margin: 0;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 16px;
      color: #fff;
    }
    h2 span {
      color: #4CAF50;
    }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .status.ok { background: #1b5e20; color: #a5d6a7; }
    .status.warn { background: #e65100; color: #ffcc80; }
    .status.off { background: #b71c1c; color: #ef9a9a; }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #333;
    }
    .row label { font-size: 13px; }
    .info code { background: #333; padding: 1px 4px; border-radius: 3px; }
    select, .server-input {
      background: #333; color: #e0e0e0; border: 1px solid #555;
      border-radius: 4px; padding: 4px 8px; font-size: 12px;
      max-width: 160px;
    }
    .server-input { max-width: 140px; flex: 1; }
    .btn {
      background: #4CAF50; color: #fff; border: none;
      border-radius: 4px; padding: 4px 8px; font-size: 11px;
      cursor: pointer; margin-left: 4px;
    }
    .btn-reset {
      background: #555; color: #e0e0e0; border: none;
      border-radius: 4px; padding: 4px 8px; font-size: 11px;
      cursor: pointer; margin-left: 4px;
    }
    .server-row {
      display: flex; align-items: center; gap: 4px;
      padding: 8px 0; border-bottom: 1px solid #333;
    }
    .server-row label { font-size: 11px; white-space: nowrap; }
  </style>
</head>
<body>
  <h2>YT <span>Level</span></h2>

  <div id="aiStatus" class="status"></div>

  <div class="server-row">
    <label>Servidor</label>
    <input type="text" id="serverInput" class="server-input" placeholder="http://localhost:11434">
    <button class="btn" id="saveServerBtn">OK</button>
    <button class="btn-reset" id="resetServerBtn">↺</button>
  </div>

  <div class="row" id="modelRow" style="display:none;border:none;">
    <label>Modelo</label>
    <select id="modelSelect"></select>
  </div>

  <script src="popup.js"></script>
</body>
</html>
