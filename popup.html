<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      font-family: Arial, sans-serif;
      padding: 16px;
      margin: 0;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 16px;
      color: #fff;
    }
    h2 span {
      color: #4CAF50;
    }
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 12px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #555;
    }
    .tab-btn {
      flex: 1;
      padding: 8px 0;
      font-size: 12px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      background: #333;
      color: #888;
    }
    .tab-btn.active {
      background: #4CAF50;
      color: #fff;
    }
    .section {
      display: none;
    }
    .section.active {
      display: block;
    }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .status.ok { background: #1b5e20; color: #a5d6a7; }
    .status.warn { background: #e65100; color: #ffcc80; }
    .status.off { background: #b71c1c; color: #ef9a9a; }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #333;
    }
    .row label { font-size: 13px; }
    .info code { background: #333; padding: 1px 4px; border-radius: 3px; }
    select, .server-input {
      background: #333; color: #e0e0e0; border: 1px solid #555;
      border-radius: 4px; padding: 4px 8px; font-size: 12px;
      max-width: 160px;
    }
    .server-input { max-width: 140px; flex: 1; }
    .btn {
      background: #4CAF50; color: #fff; border: none;
      border-radius: 4px; padding: 4px 8px; font-size: 11px;
      cursor: pointer; margin-left: 4px;
    }
    .btn-reset {
      background: #555; color: #e0e0e0; border: none;
      border-radius: 4px; padding: 4px 8px; font-size: 11px;
      cursor: pointer; margin-left: 4px;
    }
    .server-row {
      display: flex; align-items: center; gap: 4px;
      padding: 8px 0; border-bottom: 1px solid #333;
    }
    .server-row label { font-size: 11px; white-space: nowrap; }
    .instructions-btn {
      display: inline-block;
      background: transparent;
      color: #4CAF50;
      font-size: 14px;
      font-weight: bold;
      padding: 8px 20px;
      border: 2px solid #4CAF50;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .instructions-btn:hover {
      background: #4CAF50;
      color: #fff;
    }
    .nano-status {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 12px;
      background: #1b5e20;
      color: #a5d6a7;
    }
    .nano-status.downloading { background: #e65100; color: #ffcc80; }
    .nano-status.unavailable { background: #b71c1c; color: #ef9a9a; }
  </style>
</head>
<body>
  <h2>YT <span>Level Language Analyzer</span></h2>

  <div class="row" id="langRow" style="border:none;margin-bottom:8px;">
    <label>Lenguaje de la extensión</label>
    <select id="langSelect"></select>
  </div>

  <div class="tabs">
    <button id="tabNano" class="tab-btn active">Gemini Nano</button>
    <button id="tabOllama" class="tab-btn">Ollama</button>
  </div>

  <div id="geminiSection" class="section active">
    <div id="nanoStatus" class="nano-status unavailable">No disponible</div>

    <div class="row" style="border:none;">
      <label id="analLangLabel">Idioma de análisis</label>
      <select id="nanoLangSelect"></select>
    </div>

    <div style="text-align:center;padding:8px 0 0">
      <a href="#" id="nanoInstructionsBtn" class="instructions-btn">Instrucciones</a>
    </div>
  </div>

  <div id="ollamaSection" class="section">
    <div id="aiStatus" class="status"></div>

    <div class="server-row" id="serverRow">
      <label>Servidor</label>
      <input type="text" id="serverInput" class="server-input" placeholder="http://localhost:11434">
      <button class="btn" id="saveServerBtn">OK</button>
      <button class="btn-reset" id="resetServerBtn">↺</button>
    </div>

    <div class="row" id="modelRow" style="display:none;border:none;">
      <label>Modelo</label>
      <select id="modelSelect"></select>
    </div>

    <div style="text-align:center;padding:8px 0 0">
      <a href="#" id="instructionsBtn" class="instructions-btn">Instrucciones</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
