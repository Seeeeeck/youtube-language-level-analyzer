<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 480" width="1240" height="480" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="thumbA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a3f58"/>
      <stop offset="100%" stop-color="#1f2233"/>
    </linearGradient>
    <linearGradient id="thumbB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a3d3d"/>
      <stop offset="100%" stop-color="#2a1a1a"/>
    </linearGradient>
    <linearGradient id="thumbC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f4a3d"/>
      <stop offset="100%" stop-color="#152019"/>
    </linearGradient>
    <linearGradient id="thumbD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a3f2a"/>
      <stop offset="100%" stop-color="#221c10"/>
    </linearGradient>
    <filter id="badgeShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1240" height="480" fill="#0f0f0f"/>

  <!-- ===== Card template macro (manually repeated) ===== -->

  <!-- Card 1 -->
  <g transform="translate(40,40)">
    <rect width="260" height="146" rx="10" fill="url(#thumbA)"/>
    <rect x="204" y="120" width="46" height="18" rx="4" fill="#000" opacity="0.75"/>
    <text x="227" y="133" text-anchor="middle" fill="#fff" font-size="11">12:34</text>
    <!-- square CEFR badge -->
    <rect x="10" y="10" width="44" height="44" rx="8" fill="#4CAF50" filter="url(#badgeShadow)"/>
    <text x="32" y="38" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">A1</text>

    <g transform="translate(0,160)">
      <circle cx="14" cy="14" r="14" fill="#555"/>
      <text x="38" y="14" fill="#eee" font-size="14" font-weight="bold">Easy English Chat</text>
      <text x="38" y="33" fill="#aaa" font-size="12">Beginner Lessons</text>
      <text x="38" y="50" fill="#888" font-size="11">18K views &#183; 2 days ago</text>
    </g>
  </g>

  <!-- Card 2 -->
  <g transform="translate(330,40)">
