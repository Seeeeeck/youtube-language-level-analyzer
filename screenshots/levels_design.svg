    <g transform="translate(0,160)">
      <circle cx="14" cy="14" r="14" fill="#555"/>
      <text x="38" y="14" fill="#eee" font-size="14" font-weight="bold">Native Debate Panel</text>
      <text x="38" y="33" fill="#aaa" font-size="12">Advanced Discussion</text>
