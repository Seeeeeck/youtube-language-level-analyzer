    <rect x="204" y="120" width="46" height="18" rx="4" fill="#000" opacity="0.75"/>
    <text x="227" y="133" text-anchor="middle" fill="#fff" font-size="11">8:20</text>
    <rect x="10" y="10" width="44" height="44" rx="8" fill="#FFC107" filter="url(#badgeShadow)"/>
    <text x="32" y="38" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">B1</text>

    <g transform="translate(0,160)">
      <circle cx="14" cy="14" r="14" fill="#555"/>
      <text x="38" y="14" fill="#eee" font-size="14" font-weight="bold">Daily Conversations</text>
      <text x="38" y="33" fill="#aaa" font-size="12">Intermediate Topics</text>
      <text x="38" y="50" fill="#888" font-size="11">42K views &#183; 5 days ago</text>
    </g>
  </g>

  <!-- Card 3 -->
  <g transform="translate(620,40)">
    <rect width="260" height="146" rx="10" fill="url(#thumbD)"/>
    <rect x="204" y="120" width="46" height="18" rx="4" fill="#000" opacity="0.75"/>
    <text x="227" y="133" text-anchor="middle" fill="#fff" font-size="11">15:45</text>
    <rect x="10" y="10" width="44" height="44" rx="8" fill="#F44336" filter="url(#badgeShadow)"/>
    <text x="32" y="38" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">C1</text>

