  <!-- Legend -->
  <g transform="translate(40,340)">
    <text x="0" y="0" fill="#eee" font-size="16" font-weight="bold">CEFR Levels</text>
    <g transform="translate(0,22)" font-size="13" fill="#ccc">
      <rect x="0" y="0" width="24" height="24" rx="6" fill="#4CAF50"/><text x="32" y="17">A1 &#8211; Beginner</text>
      <rect x="200" y="0" width="24" height="24" rx="6" fill="#8BC34A"/><text x="232" y="17">A2 &#8211; Elementary</text>
      <rect x="420" y="0" width="24" height="24" rx="6" fill="#FFC107"/><text x="452" y="17">B1 &#8211; Intermediate</text>
      <rect x="670" y="0" width="24" height="24" rx="6" fill="#FF9800"/><text x="702" y="17">B2 &#8211; Upper Int.</text>
      <rect x="890" y="0" width="24" height="24" rx="6" fill="#F44336"/><text x="922" y="17">C1 &#8211; Advanced</text>
      <rect x="1080" y="0" width="24" height="24" rx="6" fill="#B71C1C"/><text x="1112" y="17">C2 &#8211; Proficient</text>
