      <text x="38" y="14" fill="#eee" font-size="14" font-weight="bold">Academic Lecture Series</text>
      <text x="38" y="33" fill="#aaa" font-size="12">University Level</text>
      <text x="38" y="50" fill="#888" font-size="11">9.3K views &#183; 1 week ago</text>
