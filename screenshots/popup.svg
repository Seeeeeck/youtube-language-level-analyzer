<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 420" width="640" height="840">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity=".15"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="320" height="420" rx="16" fill="#fff" filter="url(#shadow)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="320" height="50" rx="16" fill="#fff"/>
  <rect x="0" y="30" width="320" height="20" fill="#fff"/>
  <text x="160" y="32" text-anchor="middle" fill="#333" font-family="Arial" font-size="16" font-weight="bold" letter-spacing="1">
    YT <tspan fill="#4CAF50">Level</tspan>
  </text>

  <!-- Tabs -->
  <rect x="16" y="56" width="288" height="32" rx="6" fill="#f5f5f5"/>
  <rect x="16" y="56" width="144" height="32" rx="6" fill="#4CAF50"/>
  <text x="88" y="76" text-anchor="middle" fill="#fff" font-family="Arial" font-size="12" font-weight="bold">Gemini Nano</text>
  <text x="232" y="76" text-anchor="middle" fill="#999" font-family="Arial" font-size="12">Ollama</text>

  <!-- Status -->
  <rect x="16" y="96" width="288" height="28" rx="6" fill="#e8f5e9"/>
  <circle cx="32" cy="110" r="4" fill="#4CAF50"/>
  <text x="44" y="114" fill="#2e7d32" font-family="Arial" font-size="11">Available</text>

  <!-- Analysis language -->
  <text x="16" y="150" fill="#666" font-family="Arial" font-size="11">Analysis language</text>
  <rect x="140" y="136" width="164" height="24" rx="4" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="150" y="152" fill="#333" font-family="Arial" font-size="11">en — English</text>
  <polygon points="288,146 293,152 283,152" fill="#999"/>

  <!-- Effort mode -->
  <text x="16" y="190" fill="#666" font-family="Arial" font-size="11">Effort mode</text>
  <rect x="16" y="198" width="288" height="28" rx="4" fill="#f5f5f5"/>
  <rect x="16" y="198" width="144" height="28" rx="4" fill="#4CAF50"/>
  <text x="88" y="216" text-anchor="middle" fill="#fff" font-family="Arial" font-size="11" font-weight="bold">Quick</text>
  <text x="232" y="216" text-anchor="middle" fill="#999" font-family="Arial" font-size="11">Deep</text>

  <!-- Instructions button -->
  <rect x="105" y="244" width="110" height="36" rx="8" fill="#4CAF50"/>
  <text x="160" y="267" text-anchor="middle" fill="#fff" font-family="Arial" font-size="12" font-weight="bold">Instructions</text>

  <!-- Bottom section with badge preview -->
  <rect x="16" y="295" width="288" height="105" rx="8" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="160" y="318" text-anchor="middle" fill="#999" font-family="Arial" font-size="11">Badge preview on YouTube</text>

  <!-- Mini video cards -->
  <rect x="24" y="328" width="80" height="55" rx="4" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="24" y="328" width="80" height="32" rx="4" fill="#e8f5e9"/>
  <circle cx="34" cy="338" r="12" fill="#4CAF50" stroke="#fff" stroke-width="1.5"/>
  <text x="34" y="342" text-anchor="middle" fill="#fff" font-family="Arial" font-size="8" font-weight="bold">A1</text>
  <text x="64" y="358" fill="#333" font-family="Arial" font-size="7">Easy English</text>
  <text x="64" y="367" fill="#999" font-family="Arial" font-size="6">10K views</text>

  <rect x="116" y="328" width="80" height="55" rx="4" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="116" y="328" width="80" height="32" rx="4" fill="#fff3e0"/>
  <circle cx="126" cy="338" r="12" fill="#FFC107" stroke="#fff" stroke-width="1.5"/>
  <text x="126" y="342" text-anchor="middle" fill="#fff" font-family="Arial" font-size="8" font-weight="bold">B1</text>
  <text x="156" y="358" fill="#333" font-family="Arial" font-size="7">Intermediate</text>
  <text x="156" y="367" fill="#999" font-family="Arial" font-size="6">20K views</text>

  <rect x="208" y="328" width="80" height="55" rx="4" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="208" y="328" width="80" height="32" rx="4" fill="#ffebee"/>
  <circle cx="218" cy="338" r="12" fill="#F44336" stroke="#fff" stroke-width="1.5"/>
  <text x="218" y="342" text-anchor="middle" fill="#fff" font-family="Arial" font-size="8" font-weight="bold">C1</text>
  <text x="248" y="358" fill="#333" font-family="Arial" font-size="7">Academic</text>
  <text x="248" y="367" fill="#999" font-family="Arial" font-size="6">15K views</text>
</svg>
