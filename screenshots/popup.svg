<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 380" width="640" height="760">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity=".4"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- Window frame -->
  <rect x="8" y="8" width="304" height="364" rx="12" fill="#2d2d44" filter="url(#shadow)"/>
  <rect x="0" y="0" width="320" height="380" rx="16" fill="none"/>

  <!-- Title bar -->
  <rect x="8" y="8" width="304" height="44" rx="12" fill="#1a1a2e"/>
  <rect x="8" y="30" width="304" height="22" fill="#1a1a2e"/>
  <circle cx="28" cy="26" r="6" fill="#ff5f57"/>
  <circle cx="48" cy="26" r="6" fill="#ffbd2e"/>
  <circle cx="68" cy="26" r="6" fill="#28c840"/>

  <!-- Title -->
  <text x="160" y="30" text-anchor="middle" fill="#fff" font-family="Arial" font-size="15" font-weight="bold" letter-spacing="1">
    YT <tspan fill="#4CAF50">Level</tspan>
  </text>

  <!-- Status bar -->
  <rect x="24" y="60" width="272" height="30" rx="6" fill="#1b5e20"/>
  <text x="40" y="79" fill="#a5d6a7" font-family="Arial" font-size="12">✓ gemma3 listo</text>

  <!-- Language row -->
  <rect x="24" y="100" width="272" height="32" rx="4" fill="none"/>
  <text x="24" y="120" fill="#e0e0e0" font-family="Arial" font-size="12">Idioma</text>
  <rect x="140" y="103" width="156" height="24" rx="4" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="150" y="119" fill="#e0e0e0" font-family="Arial" font-size="11">Español</text>
  <polygon points="280,113 286,119 274,119" fill="#888"/>

  <!-- Server row -->
  <rect x="24" y="140" width="272" height="32" rx="4" fill="none"/>
  <text x="24" y="160" fill="#e0e0e0" font-family="Arial" font-size="11">Servidor</text>
  <rect x="140" y="143" width="120" height="24" rx="4" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="150" y="159" fill="#aaa" font-family="Arial" font-size="10">http://localhost:11434</text>
  <rect x="266" y="143" width="30" height="24" rx="4" fill="#4CAF50"/>
  <text x="275" y="159" fill="#fff" font-family="Arial" font-size="10" font-weight="bold">OK</text>
  <rect x="242" y="143" width="20" height="24" rx="4" fill="#555"/>
  <text x="246" y="158" fill="#e0e0e0" font-family="Arial" font-size="11">↺</text>

  <!-- Model row -->
  <rect x="24" y="180" width="272" height="32" rx="4" fill="none"/>
  <text x="24" y="200" fill="#e0e0e0" font-family="Arial" font-size="12">Modelo</text>
  <rect x="140" y="183" width="156" height="24" rx="4" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="150" y="199" fill="#e0e0e0" font-family="Arial" font-size="11">gemma3:1b</text>
  <polygon points="280,193 286,199 274,199" fill="#888"/>

  <!-- Instructions button -->
  <rect x="105" y="230" width="110" height="36" rx="8" fill="none" stroke="#4CAF50" stroke-width="2"/>
  <text x="160" y="253" text-anchor="middle" fill="#4CAF50" font-family="Arial" font-size="13" font-weight="bold">Instrucciones</text>

  <!-- Thumbnail preview area -->
  <rect x="24" y="285" width="272" height="70" rx="8" fill="#0f3460" opacity=".5"/>
  <text x="160" y="310" text-anchor="middle" fill="#888" font-family="Arial" font-size="10">Vista previa de análisis</text>

  <!-- Mini video cards with badges -->
  <rect x="32" y="320" width="60" height="35" rx="4" fill="#333"/>
  <rect x="32" y="320" width="60" height="20" rx="4" fill="#555"/>
  <circle cx="38" cy="326" r="10" fill="#4CAF50"/>
  <text x="38" y="329" text-anchor="middle" fill="#fff" font-family="Arial" font-size="7" font-weight="bold">A1</text>

  <rect x="100" y="320" width="60" height="35" rx="4" fill="#333"/>
  <rect x="100" y="320" width="60" height="20" rx="4" fill="#555"/>
  <circle cx="106" cy="326" r="10" fill="#FFC107"/>
  <text x="106" y="329" text-anchor="middle" fill="#fff" font-family="Arial" font-size="7" font-weight="bold">B1</text>

  <rect x="168" y="320" width="60" height="35" rx="4" fill="#333"/>
  <rect x="168" y="320" width="60" height="20" rx="4" fill="#555"/>
  <circle cx="174" cy="326" r="10" fill="#F44336"/>
  <text x="174" y="329" text-anchor="middle" fill="#fff" font-family="Arial" font-size="7" font-weight="bold">C1</text>

  <rect x="236" y="320" width="52" height="35" rx="4" fill="#333"/>
  <rect x="236" y="320" width="52" height="20" rx="4" fill="#555"/>
  <circle cx="242" cy="326" r="10" fill="#8BC34A"/>
  <text x="242" y="329" text-anchor="middle" fill="#fff" font-family="Arial" font-size="7" font-weight="bold">A2</text>
</svg>
